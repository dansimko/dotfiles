node.software-dsp.rules = [
  {
    matches = [
      {
        media.class = "~Audio/Sink*"
        media.name = "FIIO BTR11"
        api.bluez5.address = "~40:ED:98:1*"
        api.bluez5.profile = "~a2dp-sink*"
      }
    ]
    actions = {
      create-filter = {
        filter-graph = {
          node.description = "Truthear Zero Red Equalizer"
          media.name       = "Truthear Zero Red Equalizer"
          filter.graph     = {
              nodes = [
                {
                  type   = builtin
                  name   = eq_conv
                  label  = convolver
                  config = {
                    filename = [
                      "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_44100.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_48000.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_88200.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_96000.wav"
                      # "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_1_44100.wav",
                      # "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_1_48000.wav",
                      # "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_1_88200.wav",
                      # "/home/dasimko/.local/share/fir-filters/eq_truthear_zero_red_1_96000.wav"
                    ]
                  }
                }
              ]
              links = [
              ]
          }
          audio.channels = 2
          audio.position = [ FL FR ]
          capture.props = {
              node.name           = "effect_input.eq-zero-red"
              media.class         = Audio/Sink
              node.passive        = true
              filter.smart        = true
              filter.smart.target = {
                # node.name = "bluez_output.40_ED_98_18_61_D3.1"
                media.class        = "Audio/Sink/Internal"
                media.name         = "FIIO BTR11"
                factory.name       = "api.bluez5.a2dp.sink"
                # api.bluez5.address = "~40:ED:98:1*"
                # api.bluez5.profile = "~a2dp-sink*"
              }
          }
          playback.props = {
              node.name         = "effect_output.eq-zero-red"
              # target.node       = "bluez_output.40_ED_98_18_61_D3.1"
              media.role        = "dsp"
              stream.dont-remix = true
              node.passive      = true
          }
        }
        hide-parent = false
      }
    }
  },
  {
    matches = [
      {
        media.class        = "~Audio/Sink*"
        media.name         = "WH-1000XM2"
        api.bluez5.address = "~70:26:05:*"
        api.bluez5.profile = "~a2dp-sink*"
      }
    ]
    actions = {
      create-filter = {
        filter-graph = {
          node.description = "Sony WH-1000XM2 Equalizer"
          media.name       = "Sony WH-1000XM2 Equalizer"
          filter.graph     = {
              nodes = [
                {
                  type   = builtin
                  name   = eq_conv
                  label  = convolver
                  config = {
                    filename = [
                      "/home/dasimko/.local/share/fir-filters/eq_wh1000xm2_1_44100.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_wh1000xm2_1_48000.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_wh1000xm2_1_88200.wav",
                      "/home/dasimko/.local/share/fir-filters/eq_wh1000xm2_1_96000.wav"
                    ]
                  }
                }
              ]
              links = [
              ]
          }
          audio.channels = 2
          audio.position = [ FL FR ]
          capture.props = {
              node.name           = "effect_input.eq-wh1000xm2"
              media.class         = Audio/Sink
              node.passive        = true
              filter.smart        = true
              filter.smart.target = {
                media.class        = "Audio/Sink/Internal"
                media.name         = "WH-1000XM2"
                factory.name       = "api.bluez5.a2dp.sink"
		api.bluez5.profile = "a2dp-sink"
                # api.bluez5.address = "~70:26:05:*"
                # api.bluez5.profile = "~a2dp-sink*"
              }
          }
          playback.props = {
              node.name         = "effect_output.eq-wh1000xm2"
              # target.node       = "%s"
              media.role        = "dsp"
              stream.dont-remix = true
              node.passive      = true
          }
        }
        hide-parent = false
      }
    }
  }
]


wireplumber.profiles = {
  main = {
    node.software-dsp = required
  }
}
