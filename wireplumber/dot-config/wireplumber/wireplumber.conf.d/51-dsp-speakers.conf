node.software-dsp.rules = [
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink" }
    ]
    actions = {
      create-filter = {
        filter-graph = {
          node.description = "HD Audio Controller Speaker"
          media.name = "HD Audio Controller Speaker"
          filter.graph = {
            nodes = [
              # {
              #   type = "lv2"
              #   plugin = "http://lsp-plug.in/plugins/lv2/surge_filter_stereo"
              #   name = "surge_fade"
              #   control = {
              #     enabled = 1
              #     rms = 4.0
              #     modein = 1
              #     thr_on = 0.0001
              #     fadein = 4.0
              #     fidelay = 100.0
              #     modeout = 1
              #     thr_off = 0.000001
              #     fadeout = 4.0
              #     fodelay = 100.0
              #   }
              # },
              {
                type = "lv2"
                plugin = "https://chadmed.au/bankstown"
                name = "bassex"
                control = {
                  bypass = 0
                  amt = 1.45
                  sat_second = 1.75
                  sat_third = 2.20
                  blend = 1.0
                  ceil = 200.0
                  floor = 20.0
                  final_hp = 120.0
                }
              },
              {
                type = "lv2"
                plugin = "http://lsp-plug.in/plugins/lv2/loud_comp_mono"
                name = "ell"
                control = {
                  enabled = 1
                  input = 1.0
                  fft = 4
                }
              },
              {
                type = "lv2"
                plugin = "http://lsp-plug.in/plugins/lv2/loud_comp_mono"
                name = "elr",
                control = {
                  enabled = 1,
                  input = 1.0,
                  fft = 4
                }
              },
              {
                type = "builtin"
                label = "convolver"
                name = "convFL"
                config = {
                  filename = "/home/dasimko/.local/share/fir-filters/fir_x1_atmos_music.wav"
                  channel = 0
                }
              },
              {
                type = "builtin"
                label = "convolver"
                name = "convFR"
                config = {
                  filename = "/home/dasimko/.local/share/fir-filters/fir_x1_atmos_music.wav"
                  channel = 1
                }
              },
              {
                type = "lv2"
                plugin = "http://lsp-plug.in/plugins/lv2/mb_compressor_stereo"
                name = "woofer_bp"
                control = {
                  mode = 0
                  ce_0 = 1
                  sla_0 = 5.0
                  cr_0 = 1.75
                  al_0 = 0.725
                  at_0 = 1.0
                  rt_0 = 100
                  kn_0 = 0.125
                  cbe_1 = 1
                  sf_1 = 340.0
                  ce_1 = 0
                  cbe_2 = 0
                  ce_2 = 0
                  cbe_3 = 0
                  ce_3 = 0
                  cbe_4 = 0
                  ce_4 = 0
                  cbe_5 = 0
                  ce_5 = 0
                  cbe_6 = 0
                  ce_6 = 0
                }
              },
              {
                type = "lv2"
                plugin = "http://lsp-plug.in/plugins/lv2/compressor_stereo"
                name = "woofer_lim"
                control = {
                  enabled = 1
                  sla = 5.0
                  al = 0.96
                  at = 1.0
                  rt = 100.0
                  cr = 15.0
                  kn = 0.5
                }
              }
            ]
            links = [
              # { output = "surge_fade:out_l", input = "bassex:in_l" },
              # { output = "surge_fade:out_r", input = "bassex:in_r" },
              { output = "bassex:out_l", input = "ell:in" },
              { output = "bassex:out_r", input = "elr:in" },
              { output = "ell:out", input = "convFL:In" },
              { output = "elr:out", input = "convFR:In" },
              { output = "convFL:Out", input = "woofer_bp:in_l" },
              { output = "convFR:Out", input = "woofer_bp:in_r" },
              { output = "woofer_bp:out_l", input = "woofer_lim:in_l" },
              { output = "woofer_bp:out_r", input = "woofer_lim:in_r" },
            ]
            # inputs = [ "surge_fade:in_l", "surge_fade:in_r" ]
            inputs = [ "bassex:in_l", "bassex:in_r" ]
            # inputs = [ "ell:in", "elr:in" ]
            # outputs = [ "convFL:Out", "convFR:Out" ]
            outputs = [ "woofer_lim:out_l", "woofer_lim:out_r" ]
            capture.volumes = [
              {
                control = "ell:volume"
                min = -45
                max = 0.0
                scale = "cubic"
              },
              {
                control = "elr:volume"
                min = -45
                max = 0.0
                scale = "cubic"
              }
            ]
          }
          audio.channels = 2
          audio.position = ["FL", "FR"]
          audio.allowed-rates = [48000]
          capture.props = {
            node.name = "effect_input.speakers-convolver"
            media.class = Audio/Sink
            device.api = "dsp"
            node.virtual = false
            priority.session = 1050
            # state.default-volume = 0.343
            # filter.smart = true
            # filter.smart.target = {
            #   node.name = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink"
            # }
            device.icon-name = "audio-speakers"
          },
          playback.props = {
            node.name = "effect_output.speakers-convolver"
            target.object = "alsa_output.pci-0000_00_1f.3-platform-skl_hda_dsp_generic.HiFi__Speaker__sink"
            node.dont-fallback = true
	    media.role = "dsp"
            node.passive = true
            # node.suspend-on-idle = true
            # session.suspend-timeout-seconds = 0.05
            # latency.internal.rate = 2048
          }
        }
        hide-parent = false
      }
    }
  }
]

wireplumber.profiles = {
  main = {
    node.software-dsp = required
  }
}
